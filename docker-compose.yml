version: '3.8'

services:
  vivant-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivant-dev
    volumes:
      - .:/workspace
      - cargo-registry-cache:/home/developer/.cargo/registry
      - cargo-git-cache:/home/developer/.cargo/git
      - target-cache:/workspace/src-tauri/target
      - npm-cache:/home/developer/.npm
      # Required for UI rendering
      - /tmp/.X11-unix:/tmp/.X11-unix
    working_dir: /workspace
    environment:
      - NODE_ENV=development
      - DISPLAY=$DISPLAY
    command: /bin/bash
    stdin_open: true
    tty: true

volumes:
  cargo-registry-cache:
  cargo-git-cache:
  target-cache:
  npm-cache:
