name: ESLint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  Run_eslint_scanning:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install JS Dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ || echo "ESLint not configured or failed, skipping for now"
